# character_bindings.yaml — 《格物证道》角色声纹绑定
# novel-pipeline-write-engine v0.5.0
# 基于 voice_profiles.example.json 中的配置，扩展为完整YAML绑定
# 新增：鲁砚山（山东声纹）

novel: gewu_zhengdao
novel_title: 格物证道
version: "0.5.0"
description: >
  理工修士林观澜与他的兄弟们在修仙世界的格物之路。
  四兄弟：东北三友（许铁牛、赵二河、孙白山）+ 山东兄弟（鲁砚山）。

# ============================================================
# 角色绑定
# ============================================================
characters:

  # === 林观澜 — 理工主角 ===
  lin_guanlan:
    character_id: lin_guanlan
    name: 林观澜
    role: 主角/理工修士
    voice_type: 冷静研究员
    core_voice: >
      一切现象都有底层规律。不修仙缘修耦合，不悟道法悟噪声。
      观察先于判断，数据先于直觉，实验先于信仰。
      说话冷静、克制，带技术词汇但不卖弄。
    dialect: none
    dialect_density: 0

    register_bindings:
      primary: baihua
      secondary: []

    narration_levels:
      dialect_level: 0
      meme_level: 0
      english_level: 1
      wenyan_level: 0

    vocabulary:
      preferred:
        - 场
        - 耦合
        - 噪声
        - 信号
        - 观测
        - 数据
        - 误差
        - 反馈
        - 频率
        - 共振
      forbidden:
        - 俺
        - 咋
        - 恁
        - 啥子
        - 甭
        - 绝绝子
        - 芭比Q
        - OK
        - bro
      allowed_english:
        - field
        - model
        - noise
        - baseline
        - signal
        - data
        - error
        - feedback

    speech_style: 中短句，先观察后判断，不急于表态
    sentence_rhythm: 观察→判断→行动，说话前有一个微小停顿

    dialogue_rules:
      avoid:
        - 无意义寒暄
        - 长篇说教
        - 角色替作者解释设定
      prefer:
        - 对话推进动作
        - 用技术术语重新框定修仙概念
        - 关键判断简短有力

    action_coupling:
      must_pair_dialogue_with_action: true
      action_types:
        - 观测
        - 记录数据
        - 调整参数
        - 触摸实验对象
        - 站定观察

    meme_allowed: false
    meme_policy:
      allowed_level: none

    emotion_style: 表面平静，内心敏锐；用动作而非言语表达情绪

    dialogue_examples:
      - "灵气的本质不是雾，是场。"
      - "这个耦合常数不对。"
      - "噪声太大了，信号被淹没。"
      - "不急，先把数据过一遍再说。"
      - "你说完了？那我再测一次。"

    notes: |
      男主。方言0 / 网络梗0 / 英语仅限技术词。禁止滑稽化。
      每次验证或突破都伴随细微但真实的代价。

  # === 许铁牛 — 东北三友之一 ===
  xu_tieniu:
    character_id: xu_tieniu
    name: 许铁牛
    role: 主角兄弟/东北三友/莽撞担当
    voice_type: 嘴贫工程型
    core_voice: >
      嘴快、手快、心眼实。干就完了，想那么多干啥。
      对兄弟掏心掏肺，对外人不吃哑巴亏。
      乐观皮实，但骨子里有底层人看透冷暖的锐利。
    dialect: dongbei_light
    dialect_density: 0.25

    register_bindings:
      primary: baihua
      secondary: []

    narration_levels:
      dialect_level: 2
      meme_level: 1
      english_level: 0
      wenyan_level: 0

    vocabulary:
      preferred:
        - 整
        - 咋
        - 啥
        - 搁
        - 别（四声）
        - 老～了
        - 拉倒
        - 得了
        - 中
        - 不中
      forbidden:
        - 绝绝子
        - yyds
        - 芭比Q
        - 本座
        - 蝼蚁
        - 根据公式

    speech_style: 短句为主，直接不绕弯，带东北味儿但不小品化
    sentence_rhythm: 快，想到就说，说错了再补

    dialogue_rules:
      avoid:
        - 长篇大论
        - 文绉绉的话
        - 网络烂梗
      prefer:
        - 用动作代替废话
        - 实在话，不整虚的
        - 关键时候一句顶十句

    action_coupling:
      must_pair_dialogue_with_action: true
      action_types:
        - 拍桌子
        - 撸袖子
        - 一把拽住
        - 重重坐下
        - 闷头干活

    meme_allowed: true
    meme_policy:
      allowed_level: light
      max_per_chapter: 3
      cooldown_paragraphs: 5
      forbidden_scene:
        - 生死离别
        - 重大牺牲
        - 角色死亡
        - 高压审判
        - 告白/情感高潮
      allowed_packs:
        - dongbei_meme_pack

    emotion_style: 喜怒形于色，嘴硬心软，越在乎越不会好好说

    dialogue_examples:
      - "这事儿整挺好！"
      - "咋整啊这是？"
      - "别整那没用的，干就完了。"
      - "咱兄弟搁这儿，谁也别想欺负谁。"
      - "老铁，够意思。"

    relationship_voice:
      对林观澜: |
        观澜你说的那些俺听不懂，但你让干啥俺就干啥
      对赵二河: |
        日常互怼，嘴上谁也不服谁
      对孙白山: |
        嘴上嫌他磨叽，但真有事第一个护着
      对鲁砚山: |
        你那山东话比俺东北话还硬

    notes: |
      搞笑配角，但不是小丑。轻东北话 + 轻网络梗，每章网络梗≤1处。
      东北三友之一。憨直但不蠢，关键时刻有底层人的锐利直觉。

  # === 赵二河 — 东北三友之二 ===
  zhao_erhe:
    character_id: zhao_erhe
    name: 赵二河
    role: 主角兄弟/东北三友/精细担当
    voice_type: 谨慎务实型
    core_voice: >
      凡事留三分。嘴上不说漂亮话，心里门儿清。
      比铁牛多一个心眼，比白山少一分算计。
      是三人里最会看人脸色、最懂得什么时候该闭嘴的那个。
    dialect: dongbei_light
    dialect_density: 0.20

    register_bindings:
      primary: baihua
      secondary: []

    narration_levels:
      dialect_level: 2
      meme_level: 1
      english_level: 0
      wenyan_level: 0

    vocabulary:
      preferred:
        - 咋
        - 啥
        - 搁
        - 拉倒
        - 得了吧
        - 寻思
        - 不对劲
      forbidden:
        - 绝绝子
        - yyds
        - 芭比Q
        - 本座
        - 蝼蚁

    speech_style: 中等句长，先想再说，话不多但每句都在点上
    sentence_rhythm: 稳，有停顿，先看人脸色再开口

    dialogue_rules:
      avoid:
        - 咋咋呼呼
        - 没想好就开口
      prefer:
        - 关键信息放在最后一句
        - 用反问代替直接否定
        - 提醒别人时先铺垫

    action_coupling:
      must_pair_dialogue_with_action: true
      action_types:
        - 拉一下铁牛袖子
        - 使眼色
        - 低头琢磨
        - 指指点点
        - 默默收拾残局

    meme_allowed: true
    meme_policy:
      allowed_level: light
      max_per_chapter: 2
      cooldown_paragraphs: 8
      forbidden_scene:
        - 生死离别
        - 重大牺牲
        - 角色死亡
      allowed_packs:
        - dongbei_meme_pack

    emotion_style: 不轻易表露，急了才冒东北话，越紧张越沉默

    dialogue_examples:
      - "铁牛，别瞎整。"
      - "这事不对劲，你再寻思寻思。"
      - "得了吧，你那张嘴谁信啊。"
      - "搁我看来，这事儿没这么简单。"
      - "拉倒吧，咱哥几个先撤。"

    relationship_voice:
      对林观澜: |
        观澜你算你的，俺们给你守着
      对许铁牛: |
        日常拦着铁牛别冲动，但铁牛冲了他一定跟
      对孙白山: |
        两人合计时最默契，一个算一个看
      对鲁砚山: |
        砚山你甭跟他杠，他那嘴就是个炮仗

    notes: |
      东北三友之二。比铁牛精细，比白山实在。三人中最稳的那个。
      方言密度略低于铁牛，更克制。

  # === 孙白山 — 东北三友之三 ===
  sun_baishan:
    character_id: sun_baishan
    name: 孙白山
    role: 主角兄弟/东北三友/算计担当
    voice_type: 精明算计型
    core_voice: >
      吃亏的事不干，但兄弟的事不算账。
      脑子转得比嘴快，经常话说一半就打住了，因为另一半已经用不上了。
      三兄弟里最会"算"的人——算账、算人、算退路。
    dialect: dongbei_light
    dialect_density: 0.18

    register_bindings:
      primary: baihua
      secondary: []

    narration_levels:
      dialect_level: 2
      meme_level: 1
      english_level: 0
      wenyan_level: 0

    vocabulary:
      preferred:
        - 啥
        - 咋
        - 拉倒
        - 寻思
        - 图啥
        - 不划算
        - 亏了
        - 赚了
      forbidden:
        - 绝绝子
        - yyds
        - 芭比Q
        - 本座
        - 蝼蚁

    speech_style: 短句多，话里藏话，经常说一半留一半
    sentence_rhythm: 快，但话出口前已经算过一遍

    dialogue_rules:
      avoid:
        - 把话说死
        - 直接暴露底牌
      prefer:
        - 话说三分，留七分
        - 用算账的方式来分析局势
        - 婉转提醒，不直接点破

    action_coupling:
      must_pair_dialogue_with_action: true
      action_types:
        - 掰手指算
        - 眯眼打量
        - 拍了拍口袋
        - 凑近压低声音
        - 默默退一步

    meme_allowed: true
    meme_policy:
      allowed_level: light
      max_per_chapter: 2
      cooldown_paragraphs: 8
      forbidden_scene:
        - 生死离别
        - 重大牺牲
        - 角色死亡
      allowed_packs:
        - dongbei_meme_pack

    emotion_style: 表面笑嘻嘻，心里算仔细；真急了会骂人，但骂人也带算账味儿

    dialogue_examples:
      - "这事儿图啥？不划算。"
      - "俺寻思着，这买卖亏不了。"
      - "铁牛你甭说了，人家早就算好了。"
      - "啥也别说了，咱先走着瞧。"
      - "拉倒吧，你这账算得不对。"

    relationship_voice:
      对林观澜: |
        观澜你算你的场，俺算俺的人。咱俩配合。
      对许铁牛: |
        嫌铁牛莽撞但从来不拦（因为他知道拦不住）
      对赵二河: |
        话最少但最有默契，一个眼神就知道对方在想啥
      对鲁砚山: |
        砚山你讲你的理，俺算俺的账，咱俩不冲突

    notes: |
      东北三友之三。精但不奸，算计是为了护兄弟不是坑兄弟。
      方言密度最低，因为说话本身就克制。

  # === 鲁砚山 — 山东兄弟 ===
  lu_yanshan:
    character_id: lu_yanshan
    name: 鲁砚山
    role: 主角兄弟/义气担当
    voice_type: 讲理轴人型
    core_voice: >
      讲理、轴、爱抬杠。遇到不平事容易上头，不喜欢玄乎话，
      喜欢把道理讲成粗白人话。天大地大道理最大，你修为再高也得讲理。
      做人实诚，认准了的事九头牛拉不回来。
    dialect: shandong_light
    dialect_density: 0.15

    register_bindings:
      primary: baihua
      secondary: []

    narration_levels:
      dialect_level: 1
      meme_level: 0
      english_level: 0
      wenyan_level: 0

    vocabulary:
      preferred:
        - 俺
        - 恁
        - 咋
        - 甭
        - 忒
        - 中
        - 不中
        - 怪得劲
        - 俺寻思
        - 实诚
        - 讲理
      forbidden:
        - 绝绝子
        - yyds
        - 芭比Q
        - 本座
        - 蝼蚁
        - 天命
        - 大道

    speech_style: 短句、直接、抬杠时带反问。不讲虚的不绕弯
    sentence_rhythm: 干脆，一句是一句。抬杠时节奏加快，反问连发

    dialogue_rules:
      avoid:
        - 长篇大论
        - 文绉绉的话
        - 玄乎其玄的说辞
        - 地域刻板丑化
      prefer:
        - 把复杂道理掰成粗白人话
        - 用反问句式抬杠
        - 认准了就一句话说到底
        - 满篇方言（禁止过度使用）

    action_coupling:
      must_pair_dialogue_with_action: true
      action_types:
        - 站定不动
        - 直视对方
        - 拍案
        - 一把拦住
        - 扭头就走
        - 重重点头

    meme_allowed: false
    meme_policy:
      allowed_level: none
      forbidden_scene:
        - 所有场景

    emotion_style: 平时稳当，遇到不平事就上头。越气越讲理，越讲越轴

    dialogue_examples:
      - "俺寻思这事儿不对。"
      - "中，俺跟你去。"
      - "恁别光算数，人也得算进去。"
      - "不讲理的规矩，那就不是规矩。"
      - "俺山东话咋了？俺这叫句句实诚。"
      - "你们仨普通话标准不标准俺不知道，反正俺听着挺热闹。"

    relationship_voice:
      对林观澜: |
        格物俺整不明白，但你挨欺负俺得管
      对东北三友: |
        方言互怼，但遇到外人欺负底层时立刻一致对外
      对许铁牛: |
        铁牛你甭莽，咱先讲讲理——然后铁牛冲了他也一起冲
      对赵二河: |
        赵二河是唯一能让他先听人把话说完再抬杠的人
      对孙白山: |
        白山你算账中，但人不能光算账

    forbidden_patterns:
      - 满篇方言
      - 地域刻板丑化
      - 山东人只会说倒装句的刻板印象
      - 把"讲理"写成一个笑话

    signature:
      catchphrases:
        - "俺寻思……"
        - "这事儿不对。"
        - "恁先听俺说。"
      gestures:
        - 站定不动如钉
        - 抬杠时微微前倾
        - 认准了重重点头
      thinking_patterns:
        - 凡事先问"对不对"
        - 讲理不讲利
        - 越复杂的事越往简单里想
      taboos:
        - 不讲理的事
        - 欺负老实人
        - 说一套做一套

    notes: |
      山东兄弟。核心人设：讲理、轴、实诚。方言轻声纹（0.15），
      每章山东方言出现不超过3-5处。禁止网络梗。禁止地域刻板丑化。

      重要：不要死亡。东北三友已经承担三次死亡代价，
      鲁砚山应该成为"活着的人怎样背着死者继续走"的角色。
      他的"轴"和"讲理"是兄弟们死后他继续走下去的理由——
      因为他答应过的事，就得做到。

# ============================================================
# 全局约束
# ============================================================
global_constraints:
  # 方言策略
  dialect_policy:
    # 叙述禁止方言，仅对话可使用
    narration_dialect: false
    dialogue_dialect: true
    # 每章所有角色方言总使用次数上限
    max_dialect_per_chapter: 15

  # 梗使用全局限制
  global_meme_policy:
    allowed_level: light
    max_per_chapter: 5
    global_forbidden_packs:
      - forbidden_memes

  # 禁止在以下场景使用轻松元素
  serious_scene_lockdown:
    - 角色死亡
    - 重大牺牲
    - 生死离别
    - 高压审判
    - 告白/情感高潮
    - 突破境界（重大）

  # 四兄弟群像规则
  brotherhood_rules:
    - 日常可互怼，但外人面前一致对外
    - 东北话和山东话碰撞可产生喜剧效果，但不可过度
    - 每次有人牺牲后，剩下的人对话密度降低，沉默增多
    - 鲁砚山活着是故事的情感锚点，他的"轴"是活下去的理由

