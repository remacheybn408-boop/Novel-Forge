# genre_texture_presets.yaml — 按题材调阈值 v0.6.6
# 不同题材节奏不同，不能一刀切。
# 复合题材: --genre "xianxia+爽文" 自动合并规则
# 接入: texture check 时传入 --genre 参数

default:
  water_density_min: 60
  conflict_pressure_min: 60
  life_texture_min: 60
  voice_diversity_min: 60
  cliche_sentence_max: 8
  emotion_summary_max: 10
  pacing:
    min_deltas: 2
    weighted_deltas:
      event_delta: 1.0
      conflict_delta: 1.0
      hook_delta: 1.0
    focus_deltas: [event_delta, conflict_delta, hook_delta, decision_delta]

