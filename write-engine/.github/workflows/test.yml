name: Test

on:
  push:
    branches: [master, main, v0.4.5, v0.5.0, v0.5.5-advanced-workflow]
  pull_request:
    branches: [master, main, v0.4.5, v0.5.0, v0.5.5-advanced-workflow]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --timeout=30
